<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Refugio - Juego de Azar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('imagenes/fondo_pagina.jpg');
            background-size: cover; 
            background-attachment: fixed; 
            color: #ecf0f1;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .logo-container { margin: 20px auto 10px auto; max-width: 550px; width: 90%; }
        .logo-juego { width: 100%; height: auto; filter: drop-shadow(3px 3px 10px rgba(0, 0, 0, 0.8)); }

        .auth-container {
            background-color: rgba(44, 62, 80, 0.95); padding: 0; border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.7); display: inline-block;
            margin-top: 20px; max-width: 460px; width: 90%; border: 2px solid #f1c40f;
            overflow: hidden; vertical-align: top;
        }

        .ranking-container {
            background-color: rgba(26, 37, 48, 0.95); border: 2px solid #2ecc71;
            border-radius: 12px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.7);
            display: inline-block; margin: 20px 0 0 20px; max-width: 380px; width: 90%;
            overflow: hidden; vertical-align: top;
        }

        .ranking-header { background-color: #2ecc71; color: #1a252f; padding: 12px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .ranking-lista { padding: 15px; margin: 0; list-style: none; text-align: left; }
        .ranking-item { display: flex; justify-content: space-between; padding: 10px 8px; border-bottom: 1px solid rgba(236, 240, 241, 0.1); }
        .ranking-pos { font-weight: bold; color: #f1c40f; margin-right: 8px; }
        .ranking-user { flex-grow: 1; }
        .ranking-money { font-weight: bold; color: #2ecc71; }
        .ranking-item.top1 { background-color: rgba(241, 196, 15, 0.15); font-weight: bold; border-left: 4px solid #f1c40f; }

        .auth-tabs { display: flex; background-color: #2c3e50; border-bottom: 2px solid #f1c40f; }
        .tab-btn { flex: 1; padding: 12px 5px; background: none; border: none; color: #7f8c8d; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: #f1c40f; background-color: rgba(44, 62, 80, 0.95); border-bottom: 3px solid #f1c40f; }

        .auth-form { padding: 25px; }
        .auth-form input { padding: 12px; width: 85%; font-size: 1rem; border-radius: 6px; border: 2px solid #34495e; margin-bottom: 15px; text-align: center; background-color: #ecf0f1; }

        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 30px; max-width: 1200px; margin: 20px auto; flex-wrap: wrap; }
        .game-area { flex: 2; min-width: 320px; }
        .scoreboard { font-size: 1.5rem; background-color: rgba(52, 73, 94, 0.95); padding: 18px 30px; border-radius: 10px; display: inline-block; }
        
        .refugios-container { display: grid; grid-template-columns: repeat(3, 130px); grid-gap: 15px; justify-content: center; margin: 30px auto; }
        .refugio {
            width: 130px; height: 155px; cursor: pointer; border-radius: 12px; border: 3px solid #555;
            background-image: url('imagenes/refugio_normal.jpg'); background-size: cover;
        }
        .refugio.activo:hover { box-shadow: 0px 0px 15px #f1c40f; }
        .refugio.seleccionado { border-color: #f39c12; }
        .refugio.salvado { background-image: url('imagenes/refugio_salvado.jpg'); border-color: #2ecc71; }
        .refugio.destruido { background-image: url('imagenes/refugio_crack.jpg'); border-color: #e74c3c; }

        .oculto { display: none !important; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div class="logo-container">
        <img src="imagenes/logo_dino_refugio.png" alt="Logo" class="logo-juego" onerror="this.src='https://placehold.co/550x200/2c3e50/f1c40f?text=Dino+Refugio'">
    </div>

    <div id="contenedor-inicial-wrapper">
        <div id="pantalla-autenticacion" class="auth-container">
            <div class="auth-tabs">
                <button id="pestana-login" class="tab-btn active" onclick="alternarFormularios('login')">Iniciar Sesión</button>
                <button id="pestana-registro" class="tab-btn" onclick="alternarFormularios('registro')">Crear Cuenta</button>
            </div>
            <div id="bloque-login" class="auth-form">
                <input type="text" id="usr-login-input" placeholder="Usuario">
                <input type="password" id="pass-login-input" placeholder="Contraseña">
                <button onclick="ejecutarLogin()">Entrar</button>
                <div id="err-login-txt"></div>
            </div>
            <div id="bloque-registro" class="auth-form oculto">
                <input type="text" id="usr-reg-input" placeholder="Usuario">
                <input type="password" id="pass-reg-input" placeholder="Contraseña">
                <button onclick="ejecutarRegistro()">Registrar</button>
            </div>
        </div>
        <div id="panel-ranking" class="ranking-container">
            <div class="ranking-header">🏆 Top Exploradores</div>
            <ul id="lista-ranking-global" class="ranking-lista"></ul>
        </div>
    </div>

    <div id="seccion-juego" class="main-layout oculto">
        <div class="game-area">
            <div id="saludo-usuario" class="user-greeting"></div>
            <div class="scoreboard">Fichas: <span id="txt-fichas">1000</span> | Pozo: <span id="txt-acumulado">0</span></div>
            <div class="refugios-container" id="contenedor-refugios"></div>
            <button onclick="iniciarRonda()">Iniciar Partida</button>
            <button id="btn-retirarse" onclick="retirarse()" disabled>Cobrar</button>
            <div id="mensaje"></div>
        </div>
    </div>

    <script>
        // Configuración y variables globales
        let usuarioActual = "";
        let saldoFichas = 1000;
        let pozoAcumulado = 0;
        let apuestaPreparada = 100;
        let juegoActivo = false;
        let esperandoResultado = false;

        // --- Funciones de control de interfaz ---
        function actualizarPantalla() {
            document.getElementById('txt-fichas').innerText = saldoFichas;
            document.getElementById('txt-acumulado').innerText = pozoAcumulado;
        }

        function alternarFormularios(tipo) {
            document.getElementById('bloque-login').classList.toggle('oculto', tipo !== 'login');
            document.getElementById('bloque-registro').classList.toggle('oculto', tipo !== 'registro');
            document.getElementById('pestana-login').classList.toggle('active', tipo === 'login');
            document.getElementById('pestana-registro').classList.toggle('active', tipo === 'registro');
        }

        // --- Funciones placeholder para evitar errores de consola ---
        function ejecutarLogin() { console.log("Login iniciado..."); }
        function ejecutarRegistro() { console.log("Registro iniciado..."); }

        // --- Lógica del juego ---
        function crearRefugios() {
            const cont = document.getElementById('contenedor-refugios');
            cont.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const div = document.createElement('div');
                div.className = 'refugio activo';
                div.setAttribute('data-id', i);
                div.onclick = () => elegirRefugio(i);
                cont.appendChild(div);
            }
        }

        function iniciarRonda() {
            if (saldoFichas < apuestaPreparada) return;
            saldoFichas -= apuestaPreparada;
            pozoAcumulado = apuestaPreparada;
            juegoActivo = true;
            actualizarPantalla();
            document.getElementById('mensaje').innerText = "Elige un refugio...";
        }

        function elegirRefugio(id) {
            if (!juegoActivo || esperandoResultado) return;
            esperandoResultado = true;
            setTimeout(() => determinarDestino(id), 1000);
        }

        function determinarDestino(idSeleccionado) {
            const refugioMeteorito = Math.floor(Math.random() * 9) + 1;
            if (idSeleccionado === refugioMeteorito) {
                document.querySelector(`[data-id="${idSeleccionado}"]`).className = 'refugio destruido';
                document.getElementById('mensaje').innerText = "¡Perdiste!";
                pozoAcumulado = 0;
                juegoActivo = false;
            } else {
                document.querySelector(`[data-id="${idSeleccionado}"]`).className = 'refugio salvado';
                pozoAcumulado *= 2;
                document.getElementById('mensaje').innerText = "¡Salvado! Pozo: " + pozoAcumulado;
                document.getElementById('btn-retirarse').disabled = false;
            }
            esperandoResultado = false;
            actualizarPantalla();
        }

        function retirarse() {
            if (!juegoActivo) return;
            saldoFichas += pozoAcumulado;
            document.getElementById('mensaje').innerText = "Ganaste " + pozoAcumulado;
            pozoAcumulado = 0;
            juegoActivo = false;
            document.getElementById('btn-retirarse').disabled = true;
            actualizarPantalla();
        }

        // Inicializar el tablero
        window.onload = function() {
            crearRefugios();
            actualizarPantalla();
        };
    </script>
</body>
</html>
