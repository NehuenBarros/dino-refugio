<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Refugio - Juego de Azar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('imagenes/fondo_pagina.jpg');
            background-size: cover; 
            background-attachment: fixed; 
            color: #ecf0f1;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem; 
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9); 
        }

        p {
            font-size: 1.2rem; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
            font-weight: 500;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.5rem; 
            background-color: rgba(52, 73, 94, 0.95); 
            padding: 18px 30px;
            border-radius: 10px;
            display: inline-flex;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5); 
        }

        .fichas { 
            color: #f1c40f; 
            font-weight: bold; 
        }

        .acumulado { 
            color: #2ecc71; 
            font-weight: bold; 
        }
        
        .controles {
            margin: 20px 0;
        }

        .controles label {
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
            margin-right: 10px;
        }

        input[type="number"] {
            padding: 10px;
            width: 80px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2rem; 
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            border: 2px solid #4a3319; 
            margin: 0 5px;
            transition: 0.2s;
            background-image: url('imagenes/textura_boton.jpg');
            background-size: cover;
            background-position: center;
            color: white; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); 
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.2); 
        }

        button:disabled {
            background-image: none;
            background-color: #7f8c8d;
            border-color: #95a5a6;
            cursor: not-allowed;
            filter: none;
        }

        .refugios-container {
            display: grid;
            grid-template-columns: repeat(3, 130px); 
            grid-gap: 15px;                          
            justify-content: center;                 
            margin: 30px auto;
            width: max-content;                      
        }

        .refugio {
            width: 130px;         
            height: 155px;        
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;    
            cursor: pointer;
            user-select: none;
            transition: 0.3s;
            border-radius: 12px;  
            border: 3px solid #555;
            background-image: url('imagenes/refugio_normal.jpg');
            background-size: cover;
            background-position: center;
        }

        .refugio.activo:hover {
            transform: scale(1.08);
            box-shadow: 0px 0px 15px #f1c40f; 
        }

        .refugio.seleccionado {
            background-color: #f39c12;
            border-color: #d35400;
            background-image: none; 
        }

        .refugio.salvado {
            background-image: url('imagenes/refugio_salvado.jpg');
            border-color: #2ecc71;
        }

        .refugio.destruido {
            background-image: url('imagenes/refugio_crack.jpg');
            border-color: #e74c3c;
            animation: shake 0.5s ease-in-out; 
        }

        #mensaje {
            font-size: 1.6rem; 
            height: 40px;      
            margin-top: 25px;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.95); 
        }

        /* Animación para el temblor de la casilla destruida */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px) rotate(-2deg); }
            40%, 80% { transform: translateX(6px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <h1>🦕 Dino Refugio: ¡Esquiva el Meteorito! ☄️</h1>
    <p>Elige un refugio. Si el meteorito cae en otro lado, duplicas el pozo de la ronda. ¡Retírate antes de que te caiga encima!</p>

    <div class="scoreboard">
        <div>Mis Fichas: <span id="txt-fichas" class="fichas">1000</span></div>
        <div>Pozo Acumulado: <span id="txt-acumulado" class="acumulado">0</span></div>
    </div>

    <div class="controles">
        <label for="input-apuesta">Apuesta inicial:</label>
        <input type="number" id="input-apuesta" value="100" min="10">
        <button id="btn-iniciar" class="btn-apostar" onclick="iniciarRonda()">Iniciar Partida</button>
        <button id="btn-retirarse" class="btn-retirarse" onclick="retirarse()" disabled>Cobrar y Retirarse</button>
    </div>

    <div id="mensaje">Introduce tu apuesta y dale a Iniciar Partida.</div>

    <div class="refugios-container" id="contenedor-refugios"></div>

    <script>
        // Variables de estado del juego
        let saldoFichas = 1000;
        let pozoAcumulado = 0;
        let apuestaActual = 0;
        let juegoActivo = false; 
        let esperandoResultado = false; 

        // Elementos del DOM
        const txtFichas = document.getElementById('txt-fichas');
        const txtAcumulado = document.getElementById('txt-acumulado');
        const inputApuesta = document.getElementById('input-apuesta');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnRetirarse = document.getElementById('btn-retirarse');
        const divMensaje = document.getElementById('mensaje');
        const contenedorRefugios = document.getElementById('contenedor-refugios');

        // Generar los 9 refugios visualmente al cargar la página (Limpio de texto para texturas)
        function crearRefugios() {
            contenedorRefugios.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const div = document.createElement('div');
                div.className = 'refugio';
                div.innerText = ''; 
                div.setAttribute('data-id', i);
                div.onclick = () => elegirRefugio(i);
                contenedorRefugios.appendChild(div);
            }
        }

        // Paso 1: El jugador inicia la partida apostando un monto
        function iniciarRonda() {
            let monto = parseInt(inputApuesta.value);

            if (monto > saldoFichas) {
                divMensaje.innerText = "❌ No tienes suficientes fichas para esa apuesta.";
                return;
            }
            if (monto <= 0 || isNaN(monto)) {
                divMensaje.innerText = "❌ Introduce una apuesta válida.";
                return;
            }

            saldoFichas -= monto;
            apuestaActual = monto;
            pozoAcumulado = monto; 
            juegoActivo = true;

            actualizarPantalla();
            crearRefugios(); 

            document.querySelectorAll('.refugio').forEach(r => r.classList.add('activo'));

            btnIniciar.disabled = true;
            inputApuesta.disabled = true;
            btnRetirarse.disabled = true; 

            divMensaje.innerText = "🦖 ¡Elige un refugio para esconder al dinosaurio!";
        }

        // Paso 2: El jugador elige uno de los 9 refugios
        function elegirRefugio(idSeleccionado) {
            if (!juegoActivo || esperandoResultado) return;

            esperandoResultado = true;
            divMensaje.innerText = "⏳ El meteorito está cayendo... ¡Cruza los dedos! (3s)";

            const refugios = document.querySelectorAll('.refugio');
            refugios.forEach(r => {
                r.classList.remove('activo');
                if (parseInt(r.getAttribute('data-id')) === idSeleccionado) {
                    r.classList.add('seleccionado');
                }
            });

            setTimeout(() => {
                determinarDestino(idSeleccionado);
            }, 3000);
        }

        // Paso 3: Pasan los 3 segundos y se decide dónde cae el meteorito
        function determinarDestino(idSeleccionado) {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            const refugioMeteorito = (array[0] % 9) + 1;

            const refugios = document.querySelectorAll('.refugio');
            
            refugios.forEach(r => {
                let idActual = parseInt(r.getAttribute('data-id'));
                if (idActual === refugioMeteorito) {
                    r.className = 'refugio destruido';
                    r.innerText = '';
                }
            });

            if (idSeleccionado === refugioMeteorito) {
                divMensaje.innerText = `💥 ¡El meteorito cayó en tu refugio! Perdiste las ${pozoAcumulado} fichas acumuladas.`;
                pozoAcumulado = 0;
                juegoActivo = false;
                btnIniciar.disabled = false;
                inputApuesta.disabled = false;
                btnRetirarse.disabled = true;
            } else {
                pozoAcumulado = pozoAcumulado * 2; 
                divMensaje.innerText = `🎉 ¡Te salvaste! El pozo ahora es de ${pozoAcumulado}. ¿Te arriesgas otra vez o te retiras?`;
                
                refugios.forEach(r => {
                    if (parseInt(r.getAttribute('data-id')) === idSeleccionado) {
                        r.className = 'refugio salvado';
                        r.innerText = '';
                    } else if (parseInt(r.getAttribute('data-id')) !== refugioMeteorito) {
                        r.classList.add('activo'); 
                    }
                });

                btnRetirarse.disabled = false; 
            }

            esperandoResultado = false;
            actualizarPantalla();
        }

        // Paso 4: El jugador decide plantarse y asegurar sus ganancias
        function retirarse() {
            if (!juegoActivo || esperandoResultado) return;

            saldoFichas += pozoAcumulado;
            divMensaje.innerText = `💰 ¡Te has retirado con éxito! Sumaste ${pozoAcumulado} fichas a tu cuenta.`;
            
            pozoAcumulado = 0;
            juegoActivo = false;

            btnIniciar.disabled = false;
            inputApuesta.disabled = false;
            btnRetirarse.disabled = true;

            actualizarPantalla();
            crearRefugios();
        }

        // Función auxiliar para refrescar los datos en la interfaz
        function actualizarPantalla() {
            txtFichas.innerText = saldoFichas;
            txtAcumulado.innerText = pozoAcumulado;
        }

        // Inicializar los componentes al cargar la página
        crearRefugios();
    </script>
</body>
</html>
